<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mon Français ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --sab: env(safe-area-inset-bottom);
            --bg: #FFF5F9;
            --surface: #FFFFFF;
            --primary: #E8357A;
            --primary-light: #FFE0ED;
            --accent: #5B4FE8;
            --accent-light: #EAE8FF;
            --french: #1A56C4;
            --french-light: #DDEAFF;
            --warn: #F59300;
            --warn-light: #FFF3DC;
            --text: #1A1025;
            --muted: #9B8CA8;
            --border: #F0E6F0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        /* Subtle dot pattern */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, #E8357A18 1px, transparent 1px);
            background-size: 24px 24px;
            pointer-events: none;
            z-index: 0;
        }

        /* HEADER */
        header {
            background: var(--surface);
            border-bottom: 2px solid var(--border);
            padding: 14px 20px;
            padding-top: calc(14px + env(safe-area-inset-top));
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            display: flex;
            flex-direction: column;
        }
        .logo h1 {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.25rem;
            color: var(--primary);
            letter-spacing: -0.5px;
        }
        .logo span {
            font-size: 0.65rem;
            color: var(--muted);
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .mode-toggle {
            display: flex;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 3px;
            gap: 3px;
        }
        .mode-btn {
            border: none;
            background: transparent;
            width: 36px;
            height: 30px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            transition: all 0.2s;
            font-size: 14px;
        }
        .mode-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 2px 8px #E8357A44;
        }

        /* MAIN */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 16px;
            padding-bottom: calc(16px + env(safe-area-inset-bottom));
            position: relative;
            z-index: 1;
            max-width: 520px;
            width: 100%;
            margin: 0 auto;
        }

        /* CARD VIEW */
        #view-card { display: flex; flex-direction: column; height: 100%; }

        /* Progress */
        .progress-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .progress-label { font-size: 0.65rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
        .progress-mode { font-size: 0.65rem; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 0.06em; }
        .progress-track {
            height: 5px;
            background: var(--border);
            border-radius: 99px;
            overflow: hidden;
            margin-bottom: 14px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #FF85B3);
            border-radius: 99px;
            transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
        }

        /* The Card */
        .card {
            background: var(--surface);
            border-radius: 28px;
            border: 2px solid var(--border);
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            margin-bottom: 14px;
            min-height: 0;
            box-shadow: 0 8px 32px #E8357A0D, 0 2px 8px #00000008;
        }
        .card-top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px 0;
            flex-shrink: 0;
        }
        .category-pill {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 99px;
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .cat-warn { background: var(--warn-light); color: var(--warn); }
        .cat-info { background: var(--french-light); color: var(--french); }
        .cat-ok { background: #E0F5E8; color: #1A8A3E; }

        .shuffle-btn {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            border: 2px solid var(--border);
            background: var(--bg);
            color: var(--muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            transition: all 0.2s;
        }
        .shuffle-btn.on { background: var(--accent-light); color: var(--accent); border-color: #C5C1FF; }

        .card-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 24px;
            text-align: center;
            cursor: pointer;
            user-select: none;
            overflow-y: auto;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .lang-badge {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 99px;
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 10px;
        }
        .badge-es { background: var(--primary-light); color: var(--primary); }
        .badge-fr { background: var(--french-light); color: var(--french); }

        #text-es {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: clamp(1.4rem, 5vw, 2.2rem);
            color: var(--text);
            line-height: 1.2;
            margin-bottom: 4px;
        }

        .answer-section {
            width: 100%;
            margin-top: 20px;
            transition: opacity 0.3s, transform 0.3s;
        }
        .answer-section.hidden-answer {
            opacity: 0;
            transform: translateY(12px);
            pointer-events: none;
        }
        .divider { width: 40px; height: 3px; background: var(--border); border-radius: 99px; margin: 0 auto 16px; }

        #text-fr {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: clamp(1.2rem, 4.5vw, 2rem);
            color: var(--french);
            line-height: 1.25;
            margin-bottom: 6px;
        }
        .phonetic {
            font-size: 0.8rem;
            color: var(--muted);
            font-style: italic;
            margin-bottom: 14px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 300;
        }

        /* Danger zone pill */
        .danger-note {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: var(--warn-light);
            color: var(--warn);
            border: 1px solid #FFD99A;
            border-radius: 10px;
            font-size: 0.65rem;
            font-weight: 700;
            padding: 5px 10px;
            margin-bottom: 14px;
            text-align: left;
            max-width: 100%;
        }

        .speak-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 22px;
            background: var(--french-light);
            color: var(--french);
            border: 2px solid #C5D8FF;
            border-radius: 99px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s;
            letter-spacing: 0.02em;
        }
        .speak-btn:active { transform: scale(0.95); }

        .tap-hint {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
            animation: pulse 2s infinite;
            white-space: nowrap;
        }
        @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

        /* Controls */
        .controls {
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }
        .ctrl-btn {
            border: 2px solid var(--border);
            background: var(--surface);
            border-radius: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.15s;
            color: var(--text);
        }
        .ctrl-btn:active { transform: scale(0.92); }
        .ctrl-btn:disabled { opacity: 0.3; pointer-events: none; }
        #btn-prev { width: 54px; height: 54px; }
        #btn-reset { width: 54px; height: 54px; color: var(--muted); }
        #btn-next {
            flex: 1;
            height: 54px;
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            box-shadow: 0 4px 16px #E8357A44;
        }
        #btn-next:active { transform: scale(0.96); }

        /* LIST VIEW */
        #view-list {
            display: none;
            flex-direction: column;
            height: 100%;
            background: var(--surface);
            border-radius: 24px;
            border: 2px solid var(--border);
            overflow: hidden;
        }
        #view-list.visible { display: flex; }
        .search-bar {
            padding: 12px 14px;
            border-bottom: 2px solid var(--border);
            background: var(--bg);
            flex-shrink: 0;
        }
        .search-bar input {
            width: 100%;
            padding: 9px 14px;
            border-radius: 12px;
            border: 2px solid var(--border);
            background: var(--surface);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            color: var(--text);
            outline: none;
        }
        .search-bar input:focus { border-color: var(--primary); }
        .list-scroll {
            overflow-y: auto;
            flex: 1;
        }
        .list-scroll::-webkit-scrollbar { width: 4px; }
        .list-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
        .list-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--bg);
            cursor: pointer;
            transition: background 0.15s;
        }
        .list-item:active { background: var(--primary-light); }
        .list-num { font-size: 0.65rem; font-weight: 700; color: var(--muted); width: 22px; text-align: right; flex-shrink: 0; margin-top: 3px; }
        .list-es { font-size: 0.85rem; font-weight: 700; color: var(--text); margin-bottom: 2px; }
        .list-fr { font-size: 0.78rem; color: var(--french); font-weight: 500; }
        .list-phonetic { font-size: 0.65rem; color: var(--muted); font-style: italic; }

        /* Danger icon */
        .list-danger {
            font-size: 0.6rem;
            background: var(--warn-light);
            color: var(--warn);
            border-radius: 6px;
            padding: 1px 5px;
            font-weight: 700;
            margin-left: 4px;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <h1>Mon Français ✨</h1>
        <span>Masa crítica · 120 frases esenciales</span>
    </div>
    <div class="mode-toggle">
        <button class="mode-btn active" id="btn-mode-card" onclick="setMode('card')" title="Tarjetas">🃏</button>
        <button class="mode-btn" id="btn-mode-list" onclick="setMode('list')" title="Lista">☰</button>
    </div>
</header>

<main>
    <!-- CARD VIEW -->
    <div id="view-card">
        <div class="progress-row">
            <span class="progress-label" id="progress-text">Frase 1 de 120</span>
            <span class="progress-mode" id="shuffle-indicator">Secuencial</span>
        </div>
        <div class="progress-track">
            <div class="progress-fill" id="progress-bar" style="width:0.83%"></div>
        </div>

        <div class="card">
            <div class="card-top-bar">
                <span id="cat-pill" class="category-pill cat-info">🔤 Básico</span>
                <button class="shuffle-btn" id="btn-shuffle" onclick="toggleShuffle()" title="Aleatorio">🔀</button>
            </div>

            <div class="card-body" onclick="toggleAnswer()">
                <span class="lang-badge badge-es">🇪🇸 Español</span>
                <p id="text-es">Cargando...</p>

                <div class="answer-section hidden-answer" id="answer-section">
                    <div class="divider"></div>
                    <span class="lang-badge badge-fr">🇫🇷 Français</span>
                    <p id="text-fr">Chargement...</p>
                    <p class="phonetic" id="text-phonetic"></p>
                    <div id="danger-zone" style="display:none">
                        <div class="danger-note" id="danger-text">⚠️ Nota</div>
                    </div>
                    <button class="speak-btn" onclick="event.stopPropagation(); speakCurrent()">
                        🔊 Escuchar en francés
                    </button>
                </div>

                <div class="tap-hint" id="tap-hint">Toca para ver la traducción</div>
            </div>
        </div>

        <div class="controls">
            <button class="ctrl-btn" id="btn-prev" onclick="prevCard()">◀</button>
            <button class="ctrl-btn" id="btn-reset" onclick="resetApp()" title="Reiniciar">↺</button>
            <button class="ctrl-btn" id="btn-next" onclick="nextCard()">SIGUIENTE →</button>
        </div>
    </div>

    <!-- LIST VIEW -->
    <div id="view-list">
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="🔍 Buscar frase..." onkeyup="renderList()">
        </div>
        <div class="list-scroll">
            <div id="list-body"></div>
        </div>
    </div>
</main>

const TOTAL = rawData.length;

let state = {
    mode: 'card',
    currentIndex: 0,
    showAnswer: false,
    isShuffled: false,
    order: [...Array(TOTAL).keys()]
};

function setMode(m) {
    state.mode = m;
    const card = document.getElementById('view-card');
    const list = document.getElementById('view-list');
    if (m === 'card') { card.style.display = 'flex'; list.classList.remove('visible'); }
    else              { card.style.display = 'none';  list.classList.add('visible'); renderList(); }
    document.getElementById('btn-mode-card').classList.toggle('active', m === 'card');
    document.getElementById('btn-mode-list').classList.toggle('active', m === 'list');
}

function toggleShuffle() {
    state.currentIndex = 0; state.showAnswer = false;
    if (state.isShuffled) state.order = [...Array(TOTAL).keys()];
    else state.order = [...state.order].sort(() => Math.random() - 0.5);
    state.isShuffled = !state.isShuffled;
    document.getElementById('btn-shuffle').classList.toggle('on', state.isShuffled);
    renderCard();
}

function renderCard() {
    const d = rawData[state.order[state.currentIndex]];
    document.getElementById('text-es').textContent = d.es;
    document.getElementById('text-fr').textContent = d.fr;
    document.getElementById('text-phonetic').textContent = d.ph ? `[ ${d.ph} ]` : '';

    // Category pill
    const catInfo = CAT_LABELS[d.cat] || CAT_LABELS['basico'];
    const pill = document.getElementById('cat-pill');
    pill.textContent = `${catInfo.emoji} ${catInfo.label}`;
    pill.className = `category-pill ${catInfo.cls}`;

    // Danger zone
    const dangerDiv = document.getElementById('danger-zone');
    const dangerText = document.getElementById('danger-text');
    if (d.danger) {
        dangerDiv.style.display = 'block';
        dangerText.textContent = `⚠️ ${d.danger}`;
    } else {
        dangerDiv.style.display = 'none';
    }

    // Progress
    const pct = ((state.currentIndex + 1) / TOTAL * 100).toFixed(1);
    document.getElementById('progress-bar').style.width = `${pct}%`;
    document.getElementById('progress-text').textContent = `Frase ${state.currentIndex + 1} de ${TOTAL}`;
    document.getElementById('shuffle-indicator').textContent = state.isShuffled ? '🔀 Aleatorio' : '📋 Secuencial';
    document.getElementById('btn-prev').disabled = state.currentIndex === 0;
    document.getElementById('btn-next').disabled = state.currentIndex === TOTAL - 1;

    state.showAnswer = false;
    updateAnswerUI();
}

function updateAnswerUI() {
    const s = document.getElementById('answer-section');
    const h = document.getElementById('tap-hint');
    if (state.showAnswer) {
        s.classList.remove('hidden-answer');
        h.style.display = 'none';
    } else {
        s.classList.add('hidden-answer');
        h.style.display = 'block';
    }
}

function toggleAnswer() {
    state.showAnswer = !state.showAnswer;
    updateAnswerUI();
}

function nextCard() { if (state.currentIndex < TOTAL - 1) { state.currentIndex++; renderCard(); } }
function prevCard() { if (state.currentIndex > 0)         { state.currentIndex--; renderCard(); } }
function resetApp() { state.currentIndex = 0; if (state.isShuffled) { state.isShuffled = false; state.order = [...Array(TOTAL).keys()]; document.getElementById('btn-shuffle').classList.remove('on'); } renderCard(); }

function speakFrench(text) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'fr-FR';
    u.rate = 0.85;
    window.speechSynthesis.speak(u);
}
function speakCurrent() {
    speakFrench(rawData[state.order[state.currentIndex]].fr);
}

function renderList() {
    const q = (document.getElementById('search-input').value || '').toLowerCase();
    const filtered = rawData.filter(i =>
        i.es.toLowerCase().includes(q) ||
        i.fr.toLowerCase().includes(q) ||
        (i.danger && i.danger.toLowerCase().includes(q))
    );
    document.getElementById('list-body').innerHTML = filtered.map(i => {
        const hasDanger = i.danger ? `<span class="list-danger">⚠️ zona peligrosa</span>` : '';
        return `
        <div class="list-item" onclick="speakFrench('${i.fr.replace(/'/g,"\\'").replace(/"/g,'&quot;')}')">
            <span class="list-num">${i.id}</span>
            <div style="flex:1;min-width:0">
                <div class="list-es">${i.es}${hasDanger}</div>
                <div class="list-fr">🇫🇷 ${i.fr}</div>
                ${i.ph ? `<div class="list-phonetic">[ ${i.ph} ]</div>` : ''}
                ${i.danger ? `<div style="font-size:0.6rem;color:#F59300;margin-top:3px">⚠️ ${i.danger}</div>` : ''}
            </div>
        </div>`;
    }).join('');
}

// Swipe support
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, {passive:true});
document.addEventListener('touchend', e => {
    if (state.mode !== 'card') return;
    const dx = e.changedTouches[0].screenX - touchStartX;
    if (Math.abs(dx) > 60) { if (dx < 0) nextCard(); else prevCard(); }
}, {passive:true});

window.onload = () => { renderCard(); renderList(); };
</script>
